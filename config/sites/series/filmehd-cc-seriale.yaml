# Site: filmehd-cc-seriale
# GitHub schedule: 41 */3 * * *
# Poster / episode title conventions: see repo README.

display_name: FilmeHD.cc Seriale
url: https://filmehd.cc/seriale/
method: cloudscraper
item_selector: //div[contains(@class,'flw-item')]
title_selector: concat(normalize-space(.//h3[contains(@class,'film-name')]/a/text()), ' - ', substring-after(normalize-space((.//span[contains(@class,'fdi-item')])[1]/text()), 'SS '), 'x', substring-after(normalize-space((.//span[contains(@class,'fdi-item')])[2]/text()), 'Eps ')) || normalize-space(.//h3[contains(@class,'film-name')]/a/text())
link_selector: normalize-space(.//h3[contains(@class,'film-name')]/a/@href)
description_selector: concat('<img src="', normalize-space(if (string-length(normalize-space(.//img[contains(@class,'film-poster-img')]/@data-src)) > 0) then .//img[contains(@class,'film-poster-img')]/@data-src else .//img[contains(@class,'film-poster-img')]/@src), '" style="max-width:300px;max-height:450px;width:auto;height:auto;object-fit:contain;display:block;border-radius:4px;">', '<br><a href="https://www.youtube.com/results?search_query=', encode-for-uri(concat(normalize-space(.//h3[contains(@class,'film-name')]/a/text()), ' - ', substring-after(normalize-space((.//span[contains(@class,'fdi-item')])[1]/text()), 'SS '), 'x', substring-after(normalize-space((.//span[contains(@class,'fdi-item')])[2]/text()), 'Eps '))), '+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D" target="_blank" rel="noopener noreferrer"><b style="color:#6600cc;">Trailer</b></a>', '<br><a href="https://www.imdb.com/find?q=', encode-for-uri(concat(normalize-space(.//h3[contains(@class,'film-name')]/a/text()), ' - ', substring-after(normalize-space((.//span[contains(@class,'fdi-item')])[1]/text()), 'SS '), 'x', substring-after(normalize-space((.//span[contains(@class,'fdi-item')])[2]/text()), 'Eps '))), '&s=tt&ttype=tv" target="_blank" rel="noopener noreferrer"><b style="color:#6600cc;">IMDb</b></a>')
feed_file: filmehd-cc-seriale.xml
category: episodes
max_items: 24
schedule: 41 */3 * * *
