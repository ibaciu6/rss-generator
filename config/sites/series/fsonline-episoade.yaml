# Site: fsonline-episoade
# GitHub schedule: 23 1,5,9,13,17,21 * * *
# Poster / episode title conventions: see repo README.

display_name: FSOnline Episoade
url: https://www3.fsonline.app/episoade/
method: cloudscraper
required_content_markers:
- item se
- ep-title
playwright_wait_selector: h3.ep-title
item_selector: //article[contains(@class,'item')]
title_selector: concat(substring-before(normalize-space(.//h3[contains(@class,'ep-title')]/text()), ' Sezonul '), ' - ', normalize-space(substring-before(substring-after(normalize-space(.//h3[contains(@class,'ep-title')]/text()), 'Sezonul '), ' Episodul ')), 'x', normalize-space(substring-after(normalize-space(.//h3[contains(@class,'ep-title')]/text()), 'Episodul '))) || normalize-space(.//h3[contains(@class,'ep-title')]/text()) || normalize-space(.//h3/a/text())
link_selector: normalize-space(.//div[contains(@class,'poster')]/a/@href) || normalize-space(.//h3/a/@href)
description_selector: concat('<img src="', normalize-space(if (string-length(normalize-space(.//img/@data-src)) > 0) then .//img/@data-src else .//img/@src), '" style="max-width:300px;max-height:450px;width:auto;height:auto;object-fit:contain;display:block;border-radius:4px;">', '<br><a href="https://www.youtube.com/results?search_query=', encode-for-uri(concat(substring-before(normalize-space(.//h3[contains(@class,'ep-title')]/text()), ' Sezonul '), ' - ', normalize-space(substring-before(substring-after(normalize-space(.//h3[contains(@class,'ep-title')]/text()), 'Sezonul '), ' Episodul ')), 'x', normalize-space(substring-after(normalize-space(.//h3[contains(@class,'ep-title')]/text()), 'Episodul ')))), '+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D" target="_blank" rel="noopener noreferrer"><b style="color:#6600cc;">Trailer</b></a>', '<br><a href="https://www.imdb.com/find?q=', encode-for-uri(concat(substring-before(normalize-space(.//h3[contains(@class,'ep-title')]/text()), ' Sezonul '), ' - ', normalize-space(substring-before(substring-after(normalize-space(.//h3[contains(@class,'ep-title')]/text()), 'Sezonul '), ' Episodul ')), 'x', normalize-space(substring-after(normalize-space(.//h3[contains(@class,'ep-title')]/text()), 'Episodul ')))), '&s=tt&ttype=tv" target="_blank" rel="noopener noreferrer"><b style="color:#6600cc;">IMDb</b></a>')
feed_file: fsonline-episoade.xml
category: episodes
max_items: 24
schedule: 23 1,5,9,13,17,21 * * *
