# Site: seriale-online-episodes
# GitHub schedule: 19 */5 * * *
# Poster / episode title conventions: see repo README.

display_name: Seriale Online Episodes
url: https://seriale-online.net/episoade/
method: playwright
item_selector: /html/body/div/div/div/div/div/article/div
title_selector: concat(substring-before(./img/@title, ' Sezonul '), ' - ', substring-after(substring-before(./img/@title, ' Episodul'), ' Sezonul '), 'x', substring-after(substring-before(./img/@title, ' FSonline'), ' Episodul '))
link_selector: ./a/@href
description_selector: concat('<img src="', ./img/@src, '" alt="', substring-before(./img/@title, ' Sezonul '), ' Poster" style="max-width:300px;max-height:450px;width:auto;height:auto;object-fit:contain;display:block;border-radius:4px;">', '<br><a href="https://www.youtube.com/results?search_query=', encode-for-uri(substring-before(./img/@title, ' Sezonul ')), '+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D" target="_blank" rel="noopener noreferrer"><b style="color:#6600cc;">Trailer</b></a><br>', '<a href="https://www.imdb.com/find?q=', encode-for-uri(substring-before(./img/@title, ' Sezonul ')), '&s=tt&ttype=tv" target="_blank" rel="noopener noreferrer"><b style="color:#6600cc;">IMDb</b></a>')
feed_file: seriale-online-episodes.xml
category: episodes
schedule: 19 */5 * * *
