# Site: filmehd-cc-filme
# GitHub schedule: 23 1,5,9,13,17,21 * * *
# Poster / episode title conventions: see repo README.

display_name: FilmeHD.cc Filme
url: https://filmehd.cc/filme/
method: cloudscraper
item_selector: //div[contains(@class,'flw-item')]
title_selector: if (string-length(normalize-space(string((.//span[contains(@class,'fdi-item') and not(contains(@class,'fdi-duration'))])[1]))) = 0) then normalize-space(.//h3[contains(@class,'film-name')]/a/text()) else concat(normalize-space(.//h3[contains(@class,'film-name')]/a/text()), ' (', normalize-space(string((.//span[contains(@class,'fdi-item') and not(contains(@class,'fdi-duration'))])[1])), ')')
link_selector: normalize-space(.//h3[contains(@class,'film-name')]/a/@href)
description_selector: concat('<img src="', normalize-space(if (string-length(normalize-space(.//img[contains(@class,'film-poster-img')]/@data-src)) > 0) then .//img[contains(@class,'film-poster-img')]/@data-src else .//img[contains(@class,'film-poster-img')]/@src), '" style="max-width:300px;max-height:450px;width:auto;height:auto;object-fit:contain;display:block;border-radius:4px;">', '<br><a href="https://www.youtube.com/results?search_query=', encode-for-uri(if (string-length(normalize-space(string((.//span[contains(@class,'fdi-item') and not(contains(@class,'fdi-duration'))])[1]))) = 0) then normalize-space(.//h3[contains(@class,'film-name')]/a/text()) else concat(normalize-space(.//h3[contains(@class,'film-name')]/a/text()), ' (', normalize-space(string((.//span[contains(@class,'fdi-item') and not(contains(@class,'fdi-duration'))])[1])), ')')), '+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D" target="_blank" rel="noopener noreferrer"><b style="color:#6600cc;">Trailer</b></a>', '<br><a href="https://www.imdb.com/find?q=', encode-for-uri(if (string-length(normalize-space(string((.//span[contains(@class,'fdi-item') and not(contains(@class,'fdi-duration'))])[1]))) = 0) then normalize-space(.//h3[contains(@class,'film-name')]/a/text()) else concat(normalize-space(.//h3[contains(@class,'film-name')]/a/text()), ' (', normalize-space(string((.//span[contains(@class,'fdi-item') and not(contains(@class,'fdi-duration'))])[1])), ')')), '&s=tt" target="_blank" rel="noopener noreferrer"><b style="color:#6600cc;">IMDb</b></a>')
feed_file: filmehd-cc-filme.xml
category: movies
max_items: 24
schedule: 23 1,5,9,13,17,21 * * *
