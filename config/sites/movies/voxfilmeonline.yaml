# Site: voxfilmeonline
# GitHub schedule: 23 1,5,9,13,17,21 * * *
# Poster / episode title conventions: see repo README.

display_name: VoxFilmeOnline
url: https://voxfilmeonline.biz/
method: cloudscraper
item_selector: //div[contains(@class,'movie-card')]
title_selector: normalize-space(.//div[contains(@class,'movie-title')]/text())
link_selector: normalize-space(./a/@href)
description_selector: concat('<img src="', normalize-space(.//div[contains(@class,'poster-wrap')]//img/@src), '" style="max-width:300px;max-height:450px;width:auto;height:auto;object-fit:contain;display:block;border-radius:4px;">', '<br><a href="https://www.youtube.com/results?search_query=', encode-for-uri(normalize-space(.//div[contains(@class,'movie-title')]/text())), '+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D" target="_blank" rel="noopener noreferrer"><b style="color:#6600cc;">Trailer</b></a>', '<br><a href="https://www.imdb.com/find?q=', encode-for-uri(normalize-space(.//div[contains(@class,'movie-title')]/text())), '&s=tt" target="_blank" rel="noopener noreferrer"><b style="color:#6600cc;">IMDb</b></a>')
feed_file: voxfilmeonline.xml
category: movies
max_items: 24
schedule: 23 1,5,9,13,17,21 * * *
