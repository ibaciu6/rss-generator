sites:
  filmehd-filme:
    display_name: Filmehd movies
    url: https://filmehd.to/filme/
    method: cloudscraper
    required_content_marker_groups:
    - - archive-content
      - item movies
    - - item movies
    playwright_wait_selector: article.item.movies
    item_selector: //article[contains(@class,'item') and contains(@class,'movies')]
    title_selector: normalize-space(.//div[contains(@class,'data')]//h3/text())
    link_selector: normalize-space((.//div[contains(@class,'poster')]//a/@href)[1])
    description_selector: concat('<img src="', normalize-space(if (string-length(normalize-space(.//img/@data-src))
      > 0) then .//img/@data-src else .//img/@src), '" style="max-width:300px;max-height:450px;width:auto;height:auto;object-fit:contain;display:block;border-radius:4px;">',
      '<br><a href="https://www.youtube.com/results?search_query=', encode-for-uri(normalize-space(.//div[contains(@class,'data')]//h3/text())),
      '+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D" target="_blank"
      rel="noopener noreferrer"><b style="color:#6600cc;">Trailer</b></a>', '<br><a
      href="https://www.imdb.com/find?q=', encode-for-uri(normalize-space(.//div[contains(@class,'data')]//h3/text())),
      '&s=tt" target="_blank" rel="noopener noreferrer"><b style="color:#6600cc;">IMDb</b></a>')
    feed_file: filmehd-filme.xml
    category: movies
    max_items: 24
    language: ro
  filmehd-seriale:
    display_name: Filmehd TV shows
    url: https://filmehd.to/seriale/
    method: cloudscraper
    required_content_marker_groups:
    - - item se
      - ep-title
    - - item se
    playwright_wait_selector: article.item.se
    item_selector: //article[contains(@class,'item')]
    title_selector: concat(substring-before(normalize-space(.//h3[contains(@class,'ep-title')]/text()),
      ' Sezonul '), ' - ', substring-after(normalize-space(.//h3[contains(@class,'ep-title')]/text()),
      'Sezonul '), 'x', normalize-space(string(.//span[contains(@class,'ep-number')]/text())))
      || normalize-space(.//h3[contains(@class,'ep-title')]/text()) || normalize-space(.//h3/a/text())
    link_selector: normalize-space(.//div[contains(@class,'poster')]/a/@href) || normalize-space(.//h3/a/@href)
    description_selector: concat('<img src="', normalize-space(if (string-length(normalize-space(.//img/@data-src))
      > 0) then .//img/@data-src else .//img/@src), '" style="max-width:300px;max-height:450px;width:auto;height:auto;object-fit:contain;display:block;border-radius:4px;">',
      '<br><a href="https://www.youtube.com/results?search_query=', encode-for-uri(normalize-space(substring-before(normalize-space(.//h3[contains(@class,'ep-title')]/text()),
      ' Sezonul '))), '+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D"
      target="_blank" rel="noopener noreferrer"><b style="color:#6600cc;">Trailer</b></a>',
      '<br><a href="https://www.imdb.com/find?q=', encode-for-uri(normalize-space(substring-before(normalize-space(.//h3[contains(@class,'ep-title')]/text()),
      ' Sezonul '))), '&s=tt&ttype=tv" target="_blank" rel="noopener noreferrer"><b
      style="color:#6600cc;">IMDb</b></a>')
    feed_file: filmehd-seriale.xml
    category: updates
    max_items: 24
    language: ro
  portalultautv:
    display_name: Portalultautv
