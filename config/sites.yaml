sites:
  # Hacker News front page - simple structure, reliable for testing
  hackernews:
    url: "https://news.ycombinator.com/"
    method: "http"
    item_selector: "//tr[contains(@class,'athing')]"
    title_selector: ".//span[@class='titleline']/a/text()"
    link_selector: ".//span[@class='titleline']/a/@href"
    description_selector: ""
    date_selector: ""
    feed_file: "hackernews.xml"
    category: "tech"

  sitefilme:
    url: "https://sitefilme.com/"
    method: "playwright"
    item_selector: "//article"
    title_selector: ".//h2/a/text()"
    link_selector: ".//h2/a/@href"
    description_selector: ".//p/text()"
    date_selector: ""
    feed_file: "sitefilme.xml"
    category: "movies"

  filmehd:
    url: "https://filmehd.to/"
    method: "cloudscraper"
    item_selector: "//article[contains(@class,'item')]"
    title_selector: ".//div[contains(@class,'data')]//*[self::h2 or self::h3][1]/a/text() || .//div[contains(@class,'data')]//*[self::h2 or self::h3][1]/text() || .//a[1]/@title || .//img[1]/@alt"
    link_selector: ".//div[contains(@class,'poster')]//a[1]/@href || .//div[contains(@class,'data')]//a[1]/@href || .//a[1]/@href"
    description_selector: ".//img[1]/@alt"
    date_selector: ""
    feed_file: "filmehd.xml"
    category: "movies"

