sites:
  filmehd:
    display_name: "FilmeHD"
    url: "https://filmehd.to/"
    method: "cloudscraper"
    item_selector: "//article[contains(@class,'item')]"
    title_selector: "normalize-space(.//h3[contains(@class,'ep-title')]/text()) || normalize-space(.//h3/a/text())"
    link_selector: "normalize-space(.//div[contains(@class,'poster')]/a/@href) || normalize-space(.//h3/a/@href)"
    description_selector: "concat('<img src=\"', normalize-space(if (string-length(normalize-space(.//img/@data-src)) > 0) then .//img/@data-src else .//img/@src), '\" style=\"max-width:220px;border-radius:4px;\">', '<br><a href=\"https://www.youtube.com/results?search_query=%22', encode-for-uri(normalize-space(.//h3[contains(@class,'ep-title')]/text())), '%22+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">Trailer</b></a>', '<br><a href=\"https://www.imdb.com/find?q=', encode-for-uri(normalize-space(.//h3[contains(@class,'ep-title')]/text())), '&s=tt\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">IMDb</b></a>')"
    feed_file: "filmehd.xml"
    category: "updates"
    max_items: 24

  portalultautv:
    display_name: "PortalUltaTV"
    url: "https://portalultautv.info/"
    method: "cloudscraper"
    item_selector: "//article[contains(@class,'post')]"
    title_selector: "normalize-space(.//h2[contains(@class,'entry-title')]/a/text())"
    link_selector: "normalize-space(.//h2[contains(@class,'entry-title')]/a/@href) || normalize-space(.//a[contains(@class,'wp-post-image-link')]/@href)"
    description_selector: "concat('<img src=\"', normalize-space(if (string-length(normalize-space(.//img/@data-lazy-src)) > 0) then .//img/@data-lazy-src else if (string-length(normalize-space(.//noscript//img/@src)) > 0) then .//noscript//img/@src else .//img/@src), '\" style=\"max-width:220px;border-radius:4px;\">', '<p>', normalize-space(.//div[contains(@class,'entry-excerpt')]//p[1]), '</p>')"
    feed_file: "portalultautv.xml"
    category: "updates"
    max_items: 24

  seriale-online-episodes:
    display_name: "Seriale Online Episodes"
    url: "https://seriale-online.net/episoade/"
    method: "playwright"
    item_selector: "/html/body/div/div/div/div/div/article/div"
    title_selector: "concat(substring-before(./img/@title, ' Sezonul '), ' - ', substring-after(substring-before(./img/@title, ' Episodul'), ' Sezonul '), 'x', substring-after(substring-before(./img/@title, ' FSonline'), ' Episodul '))"
    link_selector: "./a/@href"
    description_selector: "concat('<img src=\"', ./img/@src, '\" alt=\"', substring-before(./img/@title, ' Sezonul '), ' Poster\" style=\"max-width:300px;display:block;\">', '<p>', '<a href=\"https://www.youtube.com/results?search_query=%22', replace(substring-before(./img/@title, ' Sezonul '), '&', '%26'), '%22+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">Trailer</b></a><br>', '<a href=\"https://www.imdb.com/find?q=', replace(substring-before(./img/@title, ' Sezonul '), ' ', '%20'), '&s=tt&ttype=tv\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">IMDb</b></a>', '</p>')"
    feed_file: "seriale-online-episodes.xml"
    category: "episodes"

  seriale-online-movies:
    display_name: "Seriale Online Movies"
    url: "https://seriale-online.net/filme/"
    method: "playwright"
    item_selector: "/html/body/div/div/div/div/div/article/div"
    title_selector: "substring-before(./img/@title, ' Online Subttirat - FSonline')"
    link_selector: "./a/@href"
    description_selector: "concat('<img src=\"', ./img/@src, '\" alt=\"', substring-before(./img/@title, ' Online Subttirat - FSonline'), ' Poster\" style=\"max-width:300px;display:block;\">', '<p>', '<a href=\"https://www.youtube.com/results?search_query=%22', replace(substring-before(./img/@title, ' Online Subttirat - FSonline'), '&', '%26'), '%22+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">Trailer</b></a><br>', '<a href=\"https://www.imdb.com/find?q=', replace(normalize-space(substring-before(./img/@title, ' Online Subttirat - FSonline')), ' ', '%20'), '&s=tt&ttype=ft\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">IMDb</b></a>', '</p>')"
    feed_file: "seriale-online-movies.xml"
    category: "movies"

  fsonline:
    display_name: "FSOnline"
    url: "https://www3.fsonline.app/"
    method: "cloudscraper"
    item_selector: "//article[contains(@class,'item')]"
    title_selector: "normalize-space(.//h3[contains(@class,'ep-title')]/text()) || normalize-space(.//h3/a/text())"
    link_selector: "normalize-space(.//div[contains(@class,'poster')]/a/@href) || normalize-space(.//h3/a/@href)"
    feed_file: "fsonline.xml"
    category: "updates"
    detail_method: "cloudscraper"
    detail_description_selector: "concat('<img src=\"', normalize-space(if (string-length(normalize-space((//meta[@property=\"og:image\"]/@content)[1])) > 0) then if (contains(normalize-space((//meta[@property=\"og:image\"]/@content)[1]), ' /')) then substring-before(normalize-space((//meta[@property=\"og:image\"]/@content)[1]), ' /') else (//meta[@property=\"og:image\"]/@content)[1] else if (contains(normalize-space((//div[contains(@class,\"sheader\")])[1]/@style), 'url(')) then translate(substring-before(substring-after(normalize-space((//div[contains(@class,\"sheader\")])[1]/@style), 'url('), ')'), \"'\", \"\") else if (string-length(normalize-space((//div[contains(@class,\"poster\")][not(ancestor::div[contains(@class,\"featured-shows\")])]//img/@data-src)[1])) > 0) then (//div[contains(@class,\"poster\")][not(ancestor::div[contains(@class,\"featured-shows\")])]//img/@data-src)[1] else if (string-length(normalize-space((//div[contains(@class,\"poster\")][not(ancestor::div[contains(@class,\"featured-shows\")])]//img/@src)[1])) > 0) then (//div[contains(@class,\"poster\")][not(ancestor::div[contains(@class,\"featured-shows\")])]//img/@src)[1] else if (string-length(normalize-space((//div[contains(@class,\"poster\")]//img/@data-src)[1])) > 0) then (//div[contains(@class,\"poster\")]//img/@data-src)[1] else (//div[contains(@class,\"poster\")]//img/@src)[1]), '\" alt=\"', normalize-space(//h1), ' Poster\" style=\"max-width:300px;display:block;border-radius:4px;\">', '<p>', if (string-length(normalize-space((//span[contains(@class,\"tobeornot\")])[1])) > 0) then concat('<b>Audio:</b> ', normalize-space((//span[contains(@class,\"tobeornot\")])[1]), '<br>') else '', if (string-length(normalize-space((//div[contains(@class,\"wp-content\")]/p[1])[1])) > 0) then normalize-space(if (contains(normalize-space((//div[contains(@class,\"wp-content\")]/p[1])[1]), ' - ')) then substring-after(normalize-space((//div[contains(@class,\"wp-content\")]/p[1])[1]), ' - ') else normalize-space((//div[contains(@class,\"wp-content\")]/p[1])[1])) else normalize-space(if (contains(normalize-space((//meta[@name=\"description\"]/@content)[1]), ' - ')) then substring-after(normalize-space((//meta[@name=\"description\"]/@content)[1]), ' - ') else normalize-space((//meta[@name=\"description\"]/@content)[1])), '</p>', '<p><a href=\"https://www.youtube.com/results?search_query=%22', encode-for-uri(normalize-space(if (contains(normalize-space(//h1), ' Sezonul ')) then substring-before(normalize-space(//h1), ' Sezonul ') else normalize-space(//h1))), '%22+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">Trailer</b></a><br>', '<a href=\"https://www.imdb.com/find?q=', encode-for-uri(normalize-space(if (contains(normalize-space(//h1), ' Sezonul ')) then substring-before(normalize-space(//h1), ' Sezonul ') else normalize-space(//h1))), '&s=tt&ttype=tv\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">IMDb</b></a></p>')"
    max_items: 24
