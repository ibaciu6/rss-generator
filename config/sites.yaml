# Poster <img> style is shared across feeds: max 300×450px, object-fit contain (readers like Inoreader).
# Item descriptions: poster image + Trailer + IMDb links only (no synopsis/body text).
# Episode/seriale feeds: RSS titles use "<episode_name> - <S>x<E>" (seriale-online-episodes, xfilme-episodes,
# filmehd-seriale, fsonline-episoade, filmehd-cc-seriale).
# Movie feeds: use "Title (YYYY)" when year is known (filmflix, xfilme-movies; filmehd-cc-filme uses .fd-infor year; f_hdonline uses .year-box).
# filmehd / fsonline / xfilme: marker groups reject bot shells so httpx/Playwright run; playwright_wait_selector applies when Playwright is used.
sites:
  filmehd-filme:
    display_name: "FilmeHD Movies"
    url: "https://filmehd.to/filme/"
    method: "cloudscraper"
    required_content_marker_groups:
      - ["archive-content", "item movies"]
      - ["item movies"]
    playwright_wait_selector: "article.item.movies"
    item_selector: "//article[contains(@class,'item') and contains(@class,'movies')]"
    title_selector: "normalize-space(.//div[contains(@class,'data')]//h3/text())"
    link_selector: "normalize-space((.//div[contains(@class,'poster')]//a/@href)[1])"
    description_selector: "concat('<img src=\"', normalize-space(if (string-length(normalize-space(.//img/@data-src)) > 0) then .//img/@data-src else .//img/@src), '\" style=\"max-width:300px;max-height:450px;width:auto;height:auto;object-fit:contain;display:block;border-radius:4px;\">', '<br><a href=\"https://www.youtube.com/results?search_query=', encode-for-uri(normalize-space(.//div[contains(@class,'data')]//h3/text())), '+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">Trailer</b></a>', '<br><a href=\"https://www.imdb.com/find?q=', encode-for-uri(normalize-space(.//div[contains(@class,'data')]//h3/text())), '&s=tt\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">IMDb</b></a>')"
    feed_file: "filmehd-filme.xml"
    category: "movies"
    max_items: 24

  filmehd-seriale:
    display_name: "FilmeHD TV Shows"
    url: "https://filmehd.to/seriale/"
    method: "cloudscraper"
    required_content_marker_groups:
      - ["item se", "ep-title"]
      - ["item se"]
    playwright_wait_selector: "article.item.se"
    item_selector: "//article[contains(@class,'item')]"
    # Poster badge .ep-number + h3 "… Sezonul N" → "Show Name - 1x4"
    title_selector: "concat(substring-before(normalize-space(.//h3[contains(@class,'ep-title')]/text()), ' Sezonul '), ' - ', substring-after(normalize-space(.//h3[contains(@class,'ep-title')]/text()), 'Sezonul '), 'x', normalize-space(string(.//span[contains(@class,'ep-number')]/text()))) || normalize-space(.//h3[contains(@class,'ep-title')]/text()) || normalize-space(.//h3/a/text())"
    link_selector: "normalize-space(.//div[contains(@class,'poster')]/a/@href) || normalize-space(.//h3/a/@href)"
    description_selector: "concat('<img src=\"', normalize-space(if (string-length(normalize-space(.//img/@data-src)) > 0) then .//img/@data-src else .//img/@src), '\" style=\"max-width:300px;max-height:450px;width:auto;height:auto;object-fit:contain;display:block;border-radius:4px;\">', '<br><a href=\"https://www.youtube.com/results?search_query=', encode-for-uri(normalize-space(substring-before(normalize-space(.//h3[contains(@class,'ep-title')]/text()), ' Sezonul '))), '+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">Trailer</b></a>', '<br><a href=\"https://www.imdb.com/find?q=', encode-for-uri(concat(substring-before(normalize-space(.//h3[contains(@class,'ep-title')]/text()), ' Sezonul '), ' - ', substring-after(normalize-space(.//h3[contains(@class,'ep-title')]/text()), 'Sezonul '), 'x', normalize-space(string(.//span[contains(@class,'ep-number')]/text())))), '&s=tt&ttype=tv\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">IMDb</b></a>')"
    feed_file: "filmehd-seriale.xml"
    category: "updates"
    max_items: 24

  portalultautv:
    display_name: "PortalulTauTV"
    url: "https://portalultautv.info/"
    method: "cloudscraper"
