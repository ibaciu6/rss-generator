    playwright_wait_selector: "article[id^='post-']"
    item_selector: "//article[contains(@class,'post')]"
    title_selector: "normalize-space(.//h2[contains(@class,'entry-title')]/a/text())"
    link_selector: "normalize-space(.//h2[contains(@class,'entry-title')]/a/@href) || normalize-space(.//a[contains(@class,'wp-post-image-link')]/@href)"
    description_selector: "concat('<img src=\"', normalize-space(if (string-length(normalize-space(.//img/@data-lazy-src)) > 0) then .//img/@data-lazy-src else if (string-length(normalize-space(.//noscript//img/@src)) > 0) then .//noscript//img/@src else .//img/@src), '\" style=\"max-width:300px;max-height:450px;width:auto;height:auto;object-fit:contain;display:block;border-radius:4px;\">', '<br><a href=\"https://www.youtube.com/results?search_query=', encode-for-uri(normalize-space(.//h2[contains(@class,'entry-title')]/a/text())), '+preview%7Cpromo%7Ctrailer+-fake+-fan&sp=EgIYAQ%253D%253D\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">Trailer</b></a>', '<br><a href=\"https://www.imdb.com/find?q=', encode-for-uri(normalize-space(.//h2[contains(@class,'entry-title')]/a/text())), '&s=tt\" target=\"_blank\" rel=\"noopener noreferrer\"><b style=\"color:#6600cc;\">IMDb</b></a>')"
    feed_file: "portalultautv.xml"
    category: "movies"
    max_items: 24

