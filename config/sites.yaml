sites:
  # Hacker News front page - simple structure, reliable for testing
  hackernews:
    url: "https://news.ycombinator.com/"
    method: "http"
    item_selector: "//tr[contains(@class,'athing')]"
    title_selector: ".//span[@class='titleline']/a/text()"
    link_selector: ".//span[@class='titleline']/a/@href"
    description_selector: ""
    date_selector: ""
    feed_file: "hackernews.xml"
    category: "tech"

  sitefilme:
    url: "https://sitefilme.com/"
    method: "playwright"
    item_selector: "//div[contains(@class,'posts1')]//div[contains(@class,'post')]"
    title_selector: ".//div[contains(@class,'post-title')][1]/a/text() || .//a[1]/img/@alt"
    link_selector: ".//a[1]/@href"
    description_selector: ""
    date_selector: ""
    feed_file: "sitefilme.xml"
    category: "movies"
    blocked_final_hosts:
      - "56.com"
      - "www.56.com"
      - "m.56.com"
    allowed_final_hosts:
      - "sitefilme.com"
      - "www.sitefilme.com"
    allow_empty_title: true
    detail_method: "http"
    detail_title_selector: "//div[contains(@class,'video-tags')]//h1/text() || //title/text()"
    detail_description_selector: "//meta[@name='description']/@content"
    max_items: 18

  filmehd:
    url: "https://filmehd.to/"
    method: "cloudscraper"
    item_selector: "//article[contains(@class,'item')]"
    title_selector: ".//div[contains(@class,'data')]//*[self::h2 or self::h3][1]/a/text() || .//div[contains(@class,'data')]//*[self::h2 or self::h3][1]/text() || .//a[1]/@title || .//img[1]/@alt"
    link_selector: ".//div[contains(@class,'poster')]//a[1]/@href || .//div[contains(@class,'data')]//a[1]/@href || .//a[1]/@href"
    description_selector: ".//img[1]/@alt"
    date_selector: ""
    feed_file: "filmehd.xml"
    category: "movies"

  portalultautv:
    url: "https://portalultautv.biz/"
    method: "playwright"
    item_selector: "//article[contains(@class,'item')] || //article"
    title_selector: ".//div[contains(@class,'data')]//*[self::h2 or self::h3][1]/a/text() || .//div[contains(@class,'data')]//*[self::h2 or self::h3][1]/text() || .//a[1]/@title || .//img[1]/@alt"
    link_selector: ".//div[contains(@class,'poster')]//a[1]/@href || .//div[contains(@class,'data')]//a[1]/@href || .//a[1]/@href"
    description_selector: ".//img[1]/@alt"
    date_selector: ""
    feed_file: "portalultautv.xml"
    category: "tv"
    fallback_urls:
      - "https://www.portalultautv.biz/"
    allowed_final_hosts:
      - "portalultautv.biz"
      - "www.portalultautv.biz"
    max_items: 24

