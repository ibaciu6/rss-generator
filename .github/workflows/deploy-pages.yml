# Publishes GitHub Pages when feeds or the static index change (per-site feed jobs push feeds/*.xml).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "feeds/**"
      - "index.html"
      - ".nojekyll"

concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare Pages directory
        run: |
          rm -rf .site
          mkdir -p .site
          cp index.html .site/
          cp -R feeds .site/
          if [ -f .nojekyll ]; then
            cp .nojekyll .site/
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Ping WebSub hub for real-time updates
        run: |
          FEED_BASE="https://ibaciu6.github.io/rss-generator/feeds"
          HUB_URL="https://pubsubhubbub.appspot.com/"
          echo "Notifying WebSub hub of updated feeds..."
          for feed in feeds/*.xml; do
            feed_name=$(basename "$feed")
            feed_url="${FEED_BASE}/${feed_name}"
            echo "Pinging hub for: $feed_url"
            curl -s -X POST "$HUB_URL" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "hub.mode=publish" \
              --data-urlencode "hub.url=$feed_url" \
              && echo " -> OK" || echo " -> Failed (non-critical)"
          done
          echo "WebSub hub notifications complete."
