name: Update RSS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ensures all JS actions run on Node.js 24

on:
  schedule:
    # Runs every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if scripts or feeds changed
        id: changes
        run: |
          git fetch origin main --depth=1
          CHANGED_FILES=$(git diff --name-only origin/main HEAD | grep -E '^(scripts/|feeds/)' || true)
          echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          if [ -z "$CHANGED_FILES" ]; then
            echo "No relevant changes detected. Skipping feed generation."
            exit 0

      - name: Set up Python
        if: steps.changes.outputs.changed_files != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.changes.outputs.changed_files != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        if: steps.changes.outputs.changed_files != ''
        run: |
          if ! python -m playwright --version >/dev/null 2>&1; then
            python -m pip install playwright
            python -m playwright install chromium
          else
            echo "Playwright already installed"

      - name: Generate feeds
        if: steps.changes.outputs.changed_files != ''
        run: |
          PYTHONPATH=. python scripts/generate_feeds.py

      - name: Generate docs/index.html for feeds
        if: steps.changes.outputs.changed_files != ''
        run: |
          mkdir -p docs
          cat <<EOF > docs/index.html
<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>RSS Feeds</title>
</head>
<body>
  <h1>Available RSS Feeds</h1>
  <ul>
EOF
          for f in feeds/*.xml; do
            fname=$(basename "$f")
            echo "    <li><a href='../feeds/$fname'>$fname</a></li>" >> docs/index.html
          done
          echo "  </ul>
</body>
</html>" >> docs/index.html

      - name: Commit and push feeds and index
        if: steps.changes.outputs.changed_files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/*.xml docs/index.html || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update RSS feeds [automated]"
            git push
