# Generates feeds, commits updates, uploads the Pages artifact, and deploys.
# The separate "pages build deployment" run in the Actions UI is GitHub’s
# built-in companion to actions/deploy-pages — it is not a workflow file here.
name: Update RSS and Deploy Pages

on:
  push:
    branches: [main]
  schedule:
    # Inoreader documents ~hourly polling for most feeds (not faster than ~30 min);
    # WebSub (pinged after deploy) lets them fetch less often. One run/hour avoids
    # overlapping crons that could trigger multiple scrapes in the same hour.
    # https://www.inoreader.com/feed-fetcher
    - cron: "19 * * * *" # every hour at :19 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    # Feed generation uses Playwright for several sites; cap total wall time.
    timeout-minutes: 45
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Random startup delay
        if: github.event_name == 'schedule'
        run: |
          # Random delay 0-60 seconds before starting to avoid predictable timing
          DELAY=$((RANDOM % 60))
          echo "Waiting ${DELAY}s before feed generation..."
          sleep $DELAY

      - name: Generate RSS feeds
        id: generate_feeds
        continue-on-error: true
        env:
          RSS_GENERATOR_PROXY_URL: ${{ secrets.RSS_GENERATOR_PROXY_URL }}
          RSS_FEED_PUBLIC_BASE: https://ibaciu6.github.io/rss-generator
        run: |
          set -o pipefail
          PYTHONPATH=. python scripts/generate_feeds.py 2>&1 | tee feed_generation.log

      - name: Collect generation failures
        if: always()
        run: |
          mkdir -p logs
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          failures: list[str] = []
          log_path = Path("feed_generation.log")
          if log_path.exists():
              for raw_line in log_path.read_text(encoding="utf-8").splitlines():
                  line = raw_line.strip()
                  if not line.startswith("{"):
                      continue
                  try:
                      payload = json.loads(line)
                  except json.JSONDecodeError:
                      continue
                  if payload.get("event") == "site.error":
                      failures.append(f"{payload.get('site')}: {payload.get('error')}")
          else:
              failures.append("(runner): feed_generation.log missing — generate step failed before log was written")

          output = "\n".join(failures)
          if output:
              output += "\n"
          Path("logs/failed_feeds.txt").write_text(output, encoding="utf-8")
          PY
          echo "Failed feeds:"
          cat logs/failed_feeds.txt || true
          find feeds/ -name "*.xml" -size 0 -delete

      - name: Upload feed generation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feed-generation-${{ github.run_id }}
          path: |
            feed_generation.log
            logs/failed_feeds.txt
          if-no-files-found: warn

      - name: Generate index
        if: steps.generate_feeds.outcome == 'success'
        run: PYTHONPATH=. python scripts/generate_index.py

      - name: Commit changes if any
        if: steps.generate_feeds.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A feeds index.html

          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Update RSS feeds and index [skip ci]"
            # Another scheduled run or push may have advanced main while feeds were
            # generating; rebase onto the latest main so push is a fast-forward.
            git fetch origin main
            until git rebase origin/main; do
              mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
              if [ "${#conflicts[@]}" -eq 0 ]; then
                echo "Rebase stopped without listed conflicts"
                git status
                exit 1
              fi
              for f in "${conflicts[@]}"; do
                case "$f" in
                  feeds/*|index.html)
                    git checkout --theirs -- "$f"
                    git add -- "$f"
                    ;;
                  *)
                    echo "Unexpected conflict in $f"
                    git status
                    exit 1
                    ;;
                esac
              done
              GIT_EDITOR=true git rebase --continue || exit 1
            done
            git push origin HEAD:main
          fi

      - name: Prepare Pages artifact
        if: steps.generate_feeds.outcome == 'success'
        run: |
          rm -rf .site
          mkdir -p .site
          cp index.html .site/
          cp -R feeds .site/
          if [ -f .nojekyll ]; then
            cp .nojekyll .site/
          fi

      - name: Configure GitHub Pages
        if: steps.generate_feeds.outcome == 'success'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: steps.generate_feeds.outcome == 'success'
        uses: actions/upload-pages-artifact@v4
        with:
          path: .site

      - name: Fail job if feed generation crashed
        if: always() && steps.generate_feeds.outcome != 'success'
        run: |
          echo "::error::Feed generation failed — download artifact feed-generation-${{ github.run_id }} for feed_generation.log and failed_feeds.txt"
          exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: generate-and-publish
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout for feed list
        uses: actions/checkout@v6

      - name: Ping WebSub hub for real-time updates
        run: |
          FEED_BASE="https://ibaciu6.github.io/rss-generator/feeds"
          HUB_URL="https://pubsubhubbub.appspot.com/"
          
          echo "Notifying WebSub hub of updated feeds..."
          for feed in feeds/*.xml; do
            feed_name=$(basename "$feed")
            feed_url="${FEED_BASE}/${feed_name}"
            echo "Pinging hub for: $feed_url"
            curl -s -X POST "$HUB_URL" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "hub.mode=publish" \
              --data-urlencode "hub.url=$feed_url" \
              && echo " -> OK" || echo " -> Failed (non-critical)"
          done
          echo "WebSub hub notifications complete."
