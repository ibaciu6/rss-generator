name: Update RSS

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium

      - name: Generate feeds
        run: |
          PYTHONPATH=. python scripts/generate_feeds.py

      - name: Commit feeds
        run: |
          git config user.name "rss-bot"
          git config user.email "rss-bot@github.com"
          git add feeds/*.xml || echo "Nothing to add"
          git commit -m "Update RSS feeds" || echo "No changes to commit"
          git push

