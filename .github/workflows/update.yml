# .github/workflows/update.yml
name: Update RSS and Deploy Pages

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Generate RSS feeds
        env:
          RSS_GENERATOR_PROXY_URL: ${{ secrets.RSS_GENERATOR_PROXY_URL }}
        run: |
          set -o pipefail
          PYTHONPATH=. python scripts/generate_feeds.py 2>&1 | tee feed_generation.log

      - name: Collect generation failures
        run: |
          mkdir -p logs
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          failures: list[str] = []
          for raw_line in Path("feed_generation.log").read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line.startswith("{"):
                  continue
              try:
                  payload = json.loads(line)
              except json.JSONDecodeError:
                  continue
              if payload.get("event") == "site.error":
                  failures.append(f"{payload.get('site')}: {payload.get('error')}")

          output = "\n".join(failures)
          if output:
              output += "\n"
          Path("logs/failed_feeds.txt").write_text(output, encoding="utf-8")
          PY
          echo "Failed feeds:"
          cat logs/failed_feeds.txt || true
          find feeds/ -name "*.xml" -size 0 -delete

      - name: Generate index
        run: PYTHONPATH=. python scripts/generate_index.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A feeds index.html

          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Update RSS feeds and index [skip ci]"
            git push origin HEAD:main
          fi

      - name: Prepare Pages artifact
        run: |
          rm -rf .site
          mkdir -p .site
          cp index.html .site/
          cp -R feeds .site/
          if [ -f .nojekyll ]; then
            cp .nojekyll .site/
          fi

      - name: Archive Pages payload
        run: |
          tar \
            --dereference --hard-dereference \
            --directory .site \
            -cvf "$RUNNER_TEMP/github-pages.tar" \
            .
          gzip -f "$RUNNER_TEMP/github-pages.tar"

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar.gz
          retention-days: 1
          compression-level: 0
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: generate-and-publish
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
