name: Site feed — VoxFilmeOnline

on:
  schedule:
    - cron: '23 1,5,9,13,17,21 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'config/sites/movies/voxfilmeonline.yaml'
      - '.github/workflows/site-voxfilmeonline.yml'
      - 'core/**'
      - 'scraper/**'
      - 'scripts/**'
      - 'requirements.txt'
      - 'pyproject.toml'

concurrency:
  group: site-feed-voxfilmeonline
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium
      - name: Random startup delay
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 45))
          echo "Waiting $DELAY s before scrape..."
          sleep $DELAY
      - name: Generate feed
        id: generate_feed
        continue-on-error: true
        env:
          RSS_GENERATOR_PROXY_URL: ${{ secrets.RSS_GENERATOR_PROXY_URL }}
          RSS_FEED_PUBLIC_BASE: https://ibaciu6.github.io/rss-generator
        run: |
          set -o pipefail
          PYTHONPATH=. python scripts/generate_feeds.py --site voxfilmeonline 2>&1 | tee feed_generation.log
      - name: Upload generation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feed-voxfilmeonline-${{ github.run_id }}
          path: feed_generation.log
          if-no-files-found: warn
      - name: Commit feed if changed
        if: steps.generate_feed.outcome == 'success'
        run: bash scripts/ci_commit_feed.sh "voxfilmeonline.xml" "voxfilmeonline"
      - name: Fail if feed step crashed
        if: always() && steps.generate_feed.outcome != 'success'
        run: |
          echo "::error::Feed generation failed for voxfilmeonline"
          exit 1
