name: Site feed — xFilme Episodes

on:
  schedule:
    - cron: '41 */3 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'config/sites/series/xfilme-episodes.yaml'
      - '.github/workflows/site-xfilme-episodes.yml'
      - 'core/**'
      - 'scraper/**'
      - 'scripts/**'
      - 'requirements.txt'
      - 'pyproject.toml'

concurrency:
  # One feed job at a time so parallel pushes do not break rebases on main.
  group: rss-feed-commit-queue
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium
      - name: Random startup delay
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 45))
          echo "Waiting $DELAY s before scrape..."
          sleep $DELAY
      - name: Generate feed
        id: generate_feed
        continue-on-error: true
        env:
          RSS_GENERATOR_PROXY_URL: ${{ secrets.RSS_GENERATOR_PROXY_URL }}
          RSS_FEED_PUBLIC_BASE: https://ibaciu6.github.io/rss-generator
        run: |
          set -o pipefail
          PYTHONPATH=. python scripts/generate_feeds.py --site xfilme-episodes 2>&1 | tee feed_generation.log
      - name: Upload generation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feed-xfilme-episodes-${{ github.run_id }}
          path: feed_generation.log
          if-no-files-found: warn
      - name: Commit feed if changed
        if: steps.generate_feed.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "feeds/xfilme-episodes.xml"
          if git diff --cached --quiet; then
            echo "No feed changes for xfilme-episodes."
          else
            git commit -m "Update feed xfilme-episodes"
            git fetch origin main
            until git rebase origin/main; do
              mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
              if [ "${#conflicts[@]}" -eq 0 ]; then
                echo "Rebase stopped without listed conflicts"
                git status
                exit 1
              fi
              for f in "${conflicts[@]}"; do
                case "$f" in
                  feeds/*)
                    git checkout --theirs -- "$f"
                    git add -- "$f"
                    ;;
                  *)
                    echo "Unexpected conflict in $f"
                    git status
                    exit 1
                    ;;
                esac
              done
              GIT_EDITOR=true git rebase --continue || exit 1
            done
            git push origin HEAD:main
          fi
      - name: Fail if feed step crashed
        if: always() && steps.generate_feed.outcome != 'success'
        run: |
          echo "::error::Feed generation failed for xfilme-episodes"
          exit 1
