# Rebuild static index.html when site config or the generator script changes.
name: Regenerate static index

on:
  push:
    branches: [main]
    paths:
      - "config/sites/**"
      - "scripts/generate_index.py"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate static index
        run: PYTHONPATH=. python scripts/generate_index.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: regenerate static index [skip ci]"
            git fetch origin main
            until git rebase origin/main; do
              mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
              if [ "${#conflicts[@]}" -eq 0 ]; then
                echo "Rebase stopped without listed conflicts"
                git status
                exit 1
              fi
              for f in "${conflicts[@]}"; do
                case "$f" in
                  index.html)
                    git checkout --theirs -- "$f" 2>/dev/null || true
                    git add -- "$f"
                    ;;
                  *)
                    echo "Unexpected conflict in $f"
                    git status
                    exit 1
                    ;;
                esac
              done
              GIT_EDITOR=true git rebase --continue || exit 1
            done
            git push origin HEAD:main
          fi
