<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RSS Reader</title>
<style>
  :root {
    --bg: #f5f1e8; --panel: #fffaf0; --text: #1f2933;
    --muted: #52606d; --line: #d9cbb2; --accent: #9f3a16;
    --accent-soft: #f7d7c8; --sidebar-w: 240px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: Georgia, 'Times New Roman', serif;
    background: var(--bg); color: var(--text);
    display: flex; height: 100vh; overflow: hidden;
  }
  aside {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    background: var(--panel); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; overflow: hidden;
  }
  aside h1 {
    margin: 0; font-size: 1rem; padding: 16px 14px 4px;
    letter-spacing: -0.02em;
  }
  aside .sub {
    font-size: 0.72rem; color: var(--muted); padding: 0 14px 10px;
    border-bottom: 1px solid var(--line);
  }
  #feed-list {
    flex: 1; overflow-y: auto; padding: 4px 6px;
  }
  .group-label {
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted);
    padding: 10px 10px 4px; margin-top: 4px;
  }
  .group-label:first-child { margin-top: 0; padding-top: 6px; }
  .feed-item {
    display: block; width: 100%; text-align: left;
    padding: 6px 10px 6px 16px; font-size: 0.8rem; font-family: inherit;
    border: none; border-radius: 5px;
    background: transparent; color: var(--text);
    cursor: pointer; margin-bottom: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .feed-item:hover { background: var(--accent-soft); }
  .feed-item.active { background: var(--accent); color: #fff; }
  .feed-count {
    float: right; font-size: 0.7rem; opacity: 0.6;
  }
  .feed-item.active .feed-count { opacity: 0.9; }

  main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  #feed-header {
    padding: 16px 20px 10px; border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  #feed-header h2 { margin: 0; font-size: 1.05rem; }
  #feed-header h2 a { color: var(--accent); text-decoration: none; }
  #feed-header h2 a:hover { text-decoration: underline; }
  #feed-header .meta { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  #items {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .item-card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 12px 14px;
  }
  .item-card h3 { margin: 0 0 6px; font-size: 0.95rem; font-weight: 600; }
  .item-card h3 a { color: var(--accent); text-decoration: none; }
  .item-card h3 a:hover { text-decoration: underline; }
  .item-desc { font-size: 0.85rem; line-height: 1.45; }
  .item-desc img { max-width: 100%; max-height: 300px; width: auto; height: auto; object-fit: contain; display: block; border-radius: 4px; margin: 4px 0; }
  .item-desc a { color: var(--accent); }
  .item-meta { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }
  .welcome {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-style: italic; font-size: 1.1rem;
  }
  .error { color: #a61b1b; text-align: center; padding: 30px; }
  .loader { text-align: center; padding: 30px; color: var(--muted); }
  .empty { text-align: center; padding: 30px; color: var(--muted); }

  @media (max-width: 700px) {
    body { flex-direction: column; }
    aside { width: 100%; min-width: 0; max-height: 35vh; border-right: none; border-bottom: 1px solid var(--line); }
  }
</style>
</head>
<body>
<aside>
  <h1>RSS Reader</h1>
  <div class="sub">Select a feed</div>
  <div id="feed-list"></div>
</aside>
<main>
  <div id="feed-header" style="display:none"></div>
  <div id="items"><div class="welcome">Select a feed from the sidebar</div></div>
</main>
<script>
async function discoverFeeds() {
  const list = document.getElementById('feed-list');
  list.innerHTML = '<div class="loader">Loading feeds…</div>';
  try {
    const res = await fetch('index.html?t=' + Date.now());
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    list.innerHTML = '';

    const feeds = [];
    const langHeaders = doc.querySelectorAll('.lang-header');

    if (!langHeaders.length) {
      list.innerHTML = '<div class="empty">No feeds found</div>';
      return;
    }

    for (const langHeader of langHeaders) {
      const lang = langHeader.textContent.trim();
      let section = langHeader.nextElementSibling;

      while (section && section.classList.contains('table-wrap')) {
        const sectionTitle = section.querySelector('.section-title');
        const cat = sectionTitle ? sectionTitle.textContent.trim() : 'Other';
        const groupKey = lang + ' — ' + cat;

        const rows = section.querySelectorAll('tbody tr');
        for (const row of rows) {
          const nameEl = row.querySelector('td:first-child');
          if (!nameEl) continue;
          const name = nameEl.textContent.replace(/\s*EN\s*$/, '').trim();
          const rssLink = row.querySelector('td:nth-child(2) a');
          if (!rssLink) continue;
          const href = rssLink.getAttribute('href');
          if (!href) continue;
          const itemCount = row.querySelector('td:nth-child(6)')?.textContent?.trim() || '';

          feeds.push({ name, href, group: groupKey, count: itemCount });
        }

        section = section.nextElementSibling;
        while (section && !section.classList.contains('table-wrap') && !section.classList.contains('lang-header')) {
          section = section.nextElementSibling;
        }
      }
    }

    if (!feeds.length) {
      list.innerHTML = '<div class="empty">No feeds found</div>';
      return;
    }

    let lastGroup = '';
    let activeBtn = null;

    for (const feed of feeds) {
      if (feed.group !== lastGroup) {
        lastGroup = feed.group;
        const label = document.createElement('div');
        label.className = 'group-label';
        label.textContent = feed.group;
        list.appendChild(label);
      }

      const btn = document.createElement('button');
      btn.className = 'feed-item';
      btn.innerHTML = `${escHtml(feed.name)}${feed.count ? ` <span class="feed-count">${feed.count}</span>` : ''}`;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.feed-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeBtn = btn;
        loadFeed(feed.href, feed.name);
      });
      list.appendChild(btn);
    }

    const firstBtn = list.querySelector('.feed-item');
    if (firstBtn && feeds.length > 0) {
      firstBtn.classList.add('active');
      loadFeed(feeds[0].href, feeds[0].name);
    }
  } catch (e) {
    list.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}

async function loadFeed(href, feedName) {
  const header = document.getElementById('feed-header');
  const container = document.getElementById('items');
  container.innerHTML = '<div class="loader">Loading…</div>';

  try {
    const res = await fetch(href);
    const xml = await res.text();
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const channel = doc.querySelector('channel');
    if (!channel) throw new Error('No <channel> found in RSS');

    const feedTitle = channel.querySelector('title')?.textContent || feedName || 'Untitled';
    const feedDesc = channel.querySelector('description')?.textContent || '';
    const feedLink = channel.querySelector('link')?.textContent || '';
    const items = channel.querySelectorAll('item');

    header.style.display = 'block';
    header.innerHTML =
      `<h2><a href="${escAttr(feedLink)}" target="_blank">${escHtml(feedTitle)}</a></h2>` +
      `<div class="meta">${escHtml(feedDesc.substring(0, 200))} · ${items.length} items</div>`;

    container.innerHTML = '';
    for (const item of items) {
      const getTag = (tag) => item.getElementsByTagName(tag)[0]?.textContent || '';
      const title = getTag('title') || 'Untitled';
      const link = getTag('link') || '';
      let desc = getTag('description') || '';
      const encoded = item.getElementsByTagNameNS('http://purl.org/rss/1.0/modules/content/', 'encoded')[0]?.textContent;
      if (encoded) desc = encoded;
      const date = getTag('pubDate') || '';

      const card = document.createElement('div');
      card.className = 'item-card';
      card.innerHTML =
        `<h3><a href="${escAttr(link)}" target="_blank">${escHtml(title)}</a></h3>` +
        `<div class="item-desc">${desc}</div>` +
        `<div class="item-meta">${date ? new Date(date).toLocaleString() : ''}</div>`;
      container.appendChild(card);
    }

    if (items.length === 0) {
      container.innerHTML = '<div class="empty">No items in this feed</div>';
    }
  } catch (e) {
    container.innerHTML = `<div class="error">${escHtml(e.message)}</div>`;
    header.style.display = 'none';
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

discoverFeeds();
</script>
</body>
</html>
